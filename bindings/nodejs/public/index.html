<!DOCTYPE html>
<html>
<head>
    <title>ZEN Engine Evaluator</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        textarea { width: 100%; height: 300px; }
        .flex { display: flex; gap: 20px; }
        .column { flex: 1; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ZEN Engine Evaluator</h1>
    <div class="flex">
        <div class="column">
            <h3>Decision (JDM JSON)</h3>
            <textarea id="decision">{
  "nodes": [
    {
      "id": "1",
      "type": "inputNode",
      "name": "Request"
    },
    {
      "id": "2",
      "type": "decisionTableNode",
      "name": "Hello",
      "content": {
        "hitPolicy": "first",
        "inputs": [{ "field": "input", "id": "i1" }],
        "outputs": [{ "field": "output", "id": "o1" }],
        "rules": [
          { "_id": "r1", "i1": "> 10", "o1": "10" },
          { "_id": "r2", "i1": "", "o1": "0" }
        ]
      }
    },
    {
      "id": "3",
      "type": "outputNode",
      "name": "Response"
    }
  ],
  "edges": [
    { "id": "e1", "sourceId": "1", "targetId": "2" },
    { "id": "e2", "sourceId": "2", "targetId": "3" }
  ]
}</textarea>
        </div>
        <div class="column">
            <h3>Context (Input JSON)</h3>
            <textarea id="context" style="height: 100px;">{
  "input": 12
}</textarea>
            <br><br>
            <button onclick="evaluate()">Evaluate</button>
            <h3>Result</h3>
            <pre id="result">Results will appear here...</pre>
        </div>
    </div>

    <script>
        async function evaluate() {
            const decision = JSON.parse(document.getElementById('decision').value);
            const context = JSON.parse(document.getElementById('context').value);
            const res = await fetch('/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ decision, context })
            });
            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
